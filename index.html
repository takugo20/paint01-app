<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>お絵描きソフト</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      background: #eef2f7;
      color: #222;
      overflow: hidden;
    }

    body {
      -webkit-text-size-adjust: 100%;
      overscroll-behavior: none;
    }

    .app {
      max-width: 1200px;
      height: 100dvh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      padding: 12px;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      text-align: center;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: center;
      padding: 12px;
      background: #ffffff;
      border: 1px solid #d8dee4;
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.05);
    }

    .tool-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tool-group.grow {
      flex: 1 1 240px;
      min-width: 220px;
    }

    label {
      font-size: 14px;
      font-weight: bold;
      white-space: nowrap;
    }

    input[type="color"] {
      width: 46px;
      height: 40px;
      border: none;
      background: transparent;
      padding: 0;
      cursor: pointer;
    }

    input[type="range"] {
      width: 180px;
      cursor: pointer;
      flex: 1;
    }

    .size-value {
      min-width: 28px;
      text-align: center;
      font-weight: bold;
      font-size: 14px;
    }

    .icon-buttons {
      display: grid;
      grid-template-columns: repeat(6, 56px);
      gap: 10px;
    }

    .icon-btn {
      width: 56px;
      height: 56px;
      border: none;
      border-radius: 14px;
      background: #64748b;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 4px 10px rgba(100, 116, 139, 0.22);
      transition:
        transform 0.12s ease,
        opacity 0.12s ease,
        background 0.12s ease,
        box-shadow 0.12s ease,
        outline 0.12s ease;
      outline: 0 solid transparent;
    }

    .icon-btn:hover {
      opacity: 0.94;
    }

    .icon-btn:active {
      transform: scale(0.94);
      background: #334155;
      box-shadow: 0 2px 6px rgba(51, 65, 85, 0.28);
    }

    .icon-btn svg {
      width: 28px;
      height: 28px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .icon-btn.active {
      background: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2), 0 6px 14px rgba(37, 99, 235, 0.28);
    }

    .icon-btn.active:active {
      background: #1d4ed8;
    }

    .canvas-wrap {
      flex: 1;
      min-height: 0;
      background: #ffffff;
      border: 1px solid #d8dee4;
      border-radius: 14px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.05);
    }

    .viewport {
      flex: 1;
      min-height: 0;
      position: relative;
      overflow: hidden;
      background: #f8fafc;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      touch-action: none;
    }

    .stage {
      position: absolute;
      left: 0;
      top: 0;
      transform-origin: top left;
      will-change: transform;
    }

    canvas {
      display: block;
      background: #ffffff;
      border-radius: 8px;
      touch-action: none;
      cursor: crosshair;
      box-shadow: 0 0 0 1px #e2e8f0 inset;
    }

    .status-bar {
      margin-top: 10px;
      text-align: center;
      font-size: 12px;
      color: #555;
      line-height: 1.5;
    }

    .hidden-file-input {
      display: none;
    }

    @media (max-width: 900px) {
      .app {
        padding: 10px;
        gap: 10px;
      }

      h1 {
        font-size: 22px;
      }

      .toolbar {
        justify-content: stretch;
      }

      .tool-group {
        width: 100%;
      }

      .icon-buttons {
        grid-template-columns: repeat(6, 1fr);
        width: 100%;
      }

      .icon-btn {
        width: 100%;
        height: 52px;
      }
    }

    @media (max-width: 640px) {
      .toolbar {
        padding: 10px;
      }

      .icon-buttons {
        grid-template-columns: repeat(3, 1fr);
      }

      .icon-btn {
        height: 50px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>お絵描きソフト</h1>

    <div class="toolbar">
      <div class="tool-group">
        <label for="colorPicker">色</label>
        <input type="color" id="colorPicker" value="#000000" />
      </div>

      <div class="tool-group grow">
        <label for="brushSize">太さ</label>
        <input type="range" id="brushSize" min="1" max="50" value="5" />
        <span class="size-value" id="sizeValue">5</span>
      </div>

      <div class="tool-group">
        <div class="icon-buttons">
          <button id="penBtn" class="icon-btn" aria-label="ペン" title="ペン">
            <svg viewBox="0 0 24 24">
              <path d="M4 20l4.5-1 9-9-3.5-3.5-9 9L4 20z"></path>
              <path d="M13.5 5.5l3.5 3.5"></path>
            </svg>
          </button>

          <button id="eraserBtn" class="icon-btn" aria-label="消しゴム" title="消しゴム">
            <svg viewBox="0 0 24 24">
              <path d="M3.5 14.5l7.8-7.8a2.2 2.2 0 0 1 3.1 0l4.9 4.9a2.2 2.2 0 0 1 0 3.1l-4.3 4.3H8.2L3.5 14.5z"></path>
              <path d="M12.2 19H20.5"></path>
              <path d="M9.3 9.7l5 5"></path>
            </svg>
          </button>

          <button id="undoBtn" class="icon-btn" aria-label="Undo" title="Undo">
            <svg viewBox="0 0 24 24">
              <path d="M9 8H4"></path>
              <path d="M4 8l3-3"></path>
              <path d="M4 8l3 3"></path>
              <path d="M9 8h5a6 6 0 1 1 0 12h-6"></path>
            </svg>
          </button>

          <button id="loadBtn" class="icon-btn" aria-label="画像読込" title="画像読込">
            <svg viewBox="0 0 24 24">
              <path d="M12 16V5"></path>
              <path d="M8 9l4-4 4 4"></path>
              <path d="M5 19h14"></path>
            </svg>
          </button>

          <button id="saveBtn" class="icon-btn" aria-label="保存" title="保存">
            <svg viewBox="0 0 24 24">
              <path d="M6 4h9l3 3v13H6z"></path>
              <path d="M9 4v6h6V4"></path>
              <path d="M9 18h6"></path>
            </svg>
          </button>

          <button id="clearBtn" class="icon-btn" aria-label="クリア" title="クリア">
            <svg viewBox="0 0 24 24">
              <path d="M4 7h16"></path>
              <path d="M9 7V5h6v2"></path>
              <path d="M7 7l1 12h8l1-12"></path>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <div class="canvas-wrap">
      <div id="viewport" class="viewport">
        <div id="stage" class="stage">
          <canvas id="drawCanvas"></canvas>
        </div>
      </div>

      <div class="status-bar" id="statusBar">倍率: 100%</div>
    </div>
  </div>

  <input type="file" id="fileInput" class="hidden-file-input" accept="image/*" />

  <script>
    const viewport = document.getElementById("viewport");
    const stage = document.getElementById("stage");
    const canvas = document.getElementById("drawCanvas");
    const ctx = canvas.getContext("2d");

    const colorPicker = document.getElementById("colorPicker");
    const brushSize = document.getElementById("brushSize");
    const sizeValue = document.getElementById("sizeValue");
    const statusBar = document.getElementById("statusBar");

    const penBtn = document.getElementById("penBtn");
    const eraserBtn = document.getElementById("eraserBtn");
    const undoBtn = document.getElementById("undoBtn");
    const loadBtn = document.getElementById("loadBtn");
    const saveBtn = document.getElementById("saveBtn");
    const clearBtn = document.getElementById("clearBtn");
    const fileInput = document.getElementById("fileInput");

    let isDrawing = false;
    let currentTool = "pen";
    let lastX = 0;
    let lastY = 0;

    const history = [];
    const MAX_HISTORY = 30;

    let scale = 1;
    let translateX = 0;
    let translateY = 0;
    const MIN_SCALE = 1;
    const MAX_SCALE = 4;

    const activePointers = new Map();
    let isGestureMode = false;

    let gestureStartDistance = 0;
    let gestureStartScale = 1;
    let gestureStartTranslateX = 0;
    let gestureStartTranslateY = 0;
    let gestureStartCenterX = 0;
    let gestureStartCenterY = 0;
    let gestureStartCanvasX = 0;
    let gestureStartCanvasY = 0;

    let resizeTimer = null;

    function setContextStyle() {
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.lineWidth = Number(brushSize.value);

      if (currentTool === "pen") {
        ctx.globalCompositeOperation = "source-over";
        ctx.strokeStyle = colorPicker.value;
      } else {
        ctx.globalCompositeOperation = "destination-out";
        ctx.strokeStyle = "rgba(0,0,0,1)";
      }
    }

    function fillCanvasWhite() {
      ctx.save();
      ctx.globalCompositeOperation = "source-over";
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.restore();
    }

    function saveHistory() {
      if (history.length >= MAX_HISTORY) {
        history.shift();
      }
      history.push(canvas.toDataURL("image/png"));
    }

    function restoreFromDataUrl(dataUrl) {
      const image = new Image();
      image.onload = () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        fillCanvasWhite();
        ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
        setContextStyle();
      };
      image.src = dataUrl;
    }

    function undo() {
      if (history.length <= 1) return;
      history.pop();
      restoreFromDataUrl(history[history.length - 1]);
    }

    function updateToolButtons() {
      penBtn.classList.toggle("active", currentTool === "pen");
      eraserBtn.classList.toggle("active", currentTool === "eraser");
    }

    function setTool(tool) {
      currentTool = tool;
      setContextStyle();
      updateToolButtons();
    }

    function clampScale(value) {
      return Math.min(MAX_SCALE, Math.max(MIN_SCALE, value));
    }

    function getPointerDistance(p1, p2) {
      const dx = p2.clientX - p1.clientX;
      const dy = p2.clientY - p1.clientY;
      return Math.hypot(dx, dy);
    }

    function getPointerCenter(p1, p2) {
      return {
        x: (p1.clientX + p2.clientX) / 2,
        y: (p1.clientY + p2.clientY) / 2
      };
    }

    function updateTransform() {
      stage.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
      statusBar.textContent = `倍率: ${Math.round(scale * 100)}% / 位置: ${Math.round(translateX)}, ${Math.round(translateY)}`;
    }

    function centerCanvas() {
      const viewportRect = viewport.getBoundingClientRect();
      translateX = Math.max(0, (viewportRect.width - canvas.width * scale) / 2);
      translateY = Math.max(0, (viewportRect.height - canvas.height * scale) / 2);
      updateTransform();
    }

    function getCanvasPositionFromClient(clientX, clientY) {
      const viewportRect = viewport.getBoundingClientRect();
      return {
        x: (clientX - viewportRect.left - translateX) / scale,
        y: (clientY - viewportRect.top - translateY) / scale
      };
    }

    function getCanvasPosition(e) {
      return getCanvasPositionFromClient(e.clientX, e.clientY);
    }

    function beginGesture() {
      const pointers = Array.from(activePointers.values());
      if (pointers.length < 2) return;

      isGestureMode = true;
      isDrawing = false;

      const p1 = pointers[0];
      const p2 = pointers[1];
      const center = getPointerCenter(p1, p2);

      gestureStartDistance = getPointerDistance(p1, p2);
      gestureStartScale = scale;
      gestureStartTranslateX = translateX;
      gestureStartTranslateY = translateY;
      gestureStartCenterX = center.x;
      gestureStartCenterY = center.y;

      const canvasPos = getCanvasPositionFromClient(center.x, center.y);
      gestureStartCanvasX = canvasPos.x;
      gestureStartCanvasY = canvasPos.y;
    }

    function updateGesture() {
      const pointers = Array.from(activePointers.values());
      if (pointers.length < 2) return;

      const p1 = pointers[0];
      const p2 = pointers[1];
      const center = getPointerCenter(p1, p2);
      const currentDistance = getPointerDistance(p1, p2);

      let nextScale = gestureStartScale;
      if (gestureStartDistance > 0) {
        nextScale = clampScale(gestureStartScale * (currentDistance / gestureStartDistance));
      }

      const centerMoveX = center.x - gestureStartCenterX;
      const centerMoveY = center.y - gestureStartCenterY;

      scale = nextScale;
      translateX =
        gestureStartTranslateX +
        centerMoveX +
        (gestureStartCanvasX * gestureStartScale - gestureStartCanvasX * scale);

      translateY =
        gestureStartTranslateY +
        centerMoveY +
        (gestureStartCanvasY * gestureStartScale - gestureStartCanvasY * scale);

      updateTransform();
    }

    function startDrawing(e) {
      const pos = getCanvasPosition(e);
      isDrawing = true;
      lastX = pos.x;
      lastY = pos.y;
      saveHistory();
    }

    function draw(e) {
      if (!isDrawing || isGestureMode) return;

      const pos = getCanvasPosition(e);
      setContextStyle();

      ctx.beginPath();
      ctx.moveTo(lastX, lastY);
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();

      lastX = pos.x;
      lastY = pos.y;
    }

    function stopDrawing() {
      isDrawing = false;
    }

    function clearCanvas() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      fillCanvasWhite();
      setContextStyle();
      saveHistory();
    }

    function saveImage() {
      const link = document.createElement("a");
      link.href = canvas.toDataURL("image/png");
      link.download = "oekaki.png";
      link.click();
    }

    function fitImageToCanvas(img) {
      const canvasRatio = canvas.width / canvas.height;
      const imageRatio = img.width / img.height;

      let drawWidth;
      let drawHeight;
      let drawX;
      let drawY;

      if (imageRatio > canvasRatio) {
        drawWidth = canvas.width;
        drawHeight = canvas.width / imageRatio;
        drawX = 0;
        drawY = (canvas.height - drawHeight) / 2;
      } else {
        drawHeight = canvas.height;
        drawWidth = canvas.height * imageRatio;
        drawY = 0;
        drawX = (canvas.width - drawWidth) / 2;
      }

      ctx.drawImage(img, drawX, drawY, drawWidth, drawHeight);
    }

    function loadImageFile(file) {
      if (!file) return;
      if (!file.type.startsWith("image/")) return;

      const reader = new FileReader();
      reader.onload = () => {
        const img = new Image();
        img.onload = () => {
          saveHistory();
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          fillCanvasWhite();
          fitImageToCanvas(img);
          setContextStyle();
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    }

    function resizeCanvasPreserve() {
      const oldImage = canvas.toDataURL("image/png");
      const viewportRect = viewport.getBoundingClientRect();

      const newWidth = Math.max(600, Math.floor(viewportRect.width));
      const newHeight = Math.max(400, Math.floor(viewportRect.height));

      canvas.width = newWidth;
      canvas.height = newHeight;

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      fillCanvasWhite();
      setContextStyle();

      const image = new Image();
      image.onload = () => {
        ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
        setContextStyle();
        if (scale === 1) {
          centerCanvas();
        } else {
          updateTransform();
        }
      };
      image.src = oldImage;
    }

    colorPicker.addEventListener("input", () => {
      setContextStyle();
    });

    brushSize.addEventListener("input", () => {
      sizeValue.textContent = brushSize.value;
      setContextStyle();
    });

    penBtn.addEventListener("click", () => {
      setTool("pen");
    });

    eraserBtn.addEventListener("click", () => {
      setTool("eraser");
    });

    undoBtn.addEventListener("click", () => {
      undo();
    });

    loadBtn.addEventListener("click", () => {
      fileInput.click();
    });

    saveBtn.addEventListener("click", () => {
      saveImage();
    });

    clearBtn.addEventListener("click", () => {
      clearCanvas();
    });

    fileInput.addEventListener("change", (e) => {
      const file = e.target.files[0];
      loadImageFile(file);
      fileInput.value = "";
    });

    canvas.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      canvas.setPointerCapture(e.pointerId);
      activePointers.set(e.pointerId, { clientX: e.clientX, clientY: e.clientY });

      if (activePointers.size >= 2) {
        beginGesture();
        return;
      }

      if (activePointers.size === 1 && !isGestureMode) {
        startDrawing(e);
      }
    });

    canvas.addEventListener("pointermove", (e) => {
      e.preventDefault();

      if (activePointers.has(e.pointerId)) {
        activePointers.set(e.pointerId, { clientX: e.clientX, clientY: e.clientY });
      }

      if (activePointers.size >= 2) {
        if (!isGestureMode) {
          beginGesture();
        }
        updateGesture();
        return;
      }

      draw(e);
    });

    function handlePointerEnd(e) {
      e.preventDefault();
      activePointers.delete(e.pointerId);

      if (activePointers.size < 2) {
        isGestureMode = false;
      }

      stopDrawing();
    }

    canvas.addEventListener("pointerup", handlePointerEnd);
    canvas.addEventListener("pointercancel", handlePointerEnd);
    canvas.addEventListener("pointerleave", handlePointerEnd);

    window.addEventListener("resize", () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        resizeCanvasPreserve();
      }, 120);
    });

    function init() {
      sizeValue.textContent = brushSize.value;
      setContextStyle();
      updateToolButtons();
      resizeCanvasPreserve();
      saveHistory();
    }

    init();
  </script>
</body>
</html>。
