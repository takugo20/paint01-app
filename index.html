<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>お絵描きソフト</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      background: #f4f6f8;
      color: #222;
    }

    body {
      -webkit-text-size-adjust: 100%;
    }

    .app {
      max-width: 1100px;
      margin: 0 auto;
      padding: 16px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 28px;
      text-align: center;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: center;
      padding: 14px;
      background: #ffffff;
      border: 1px solid #d8dee4;
      border-radius: 12px;
      margin-bottom: 16px;
    }

    .tool-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tool-group.grow {
      flex: 1 1 220px;
    }

    label {
      font-size: 14px;
      font-weight: bold;
      white-space: nowrap;
    }

    input[type="color"] {
      width: 48px;
      height: 40px;
      border: none;
      padding: 0;
      background: transparent;
      cursor: pointer;
    }

    input[type="range"] {
      width: 180px;
      cursor: pointer;
    }

    .size-value {
      min-width: 32px;
      text-align: center;
      font-weight: bold;
    }

    button {
      height: 42px;
      padding: 0 16px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: #fff;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    button:hover {
      opacity: 0.92;
    }

    button.active {
      background: #111827;
    }

    button.sub {
      background: #475569;
    }

    .canvas-wrap {
      background: #ffffff;
      border: 1px solid #d8dee4;
      border-radius: 12px;
      padding: 12px;
    }

    canvas {
      display: block;
      width: 100%;
      height: 70vh;
      min-height: 420px;
      background: #ffffff;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      touch-action: none;
      cursor: crosshair;
    }

    .note {
      margin-top: 10px;
      font-size: 13px;
      color: #555;
      text-align: center;
    }

    @media (max-width: 768px) {
      .app {
        padding: 12px;
      }

      h1 {
        font-size: 24px;
        margin-bottom: 12px;
      }

      .toolbar {
        align-items: stretch;
        justify-content: stretch;
        gap: 10px;
        padding: 12px;
      }

      .tool-group {
        width: 100%;
      }

      .tool-group.grow {
        flex: 1 1 100%;
      }

      .tool-group.buttons {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }

      .tool-group.buttons button {
        width: 100%;
      }

      input[type="range"] {
        flex: 1;
        width: auto;
      }

      button {
        min-height: 46px;
        font-size: 15px;
      }

      canvas {
        height: 58vh;
        min-height: 320px;
      }

      .note {
        font-size: 12px;
      }
    }

    @media (max-width: 480px) {
      .tool-group.buttons {
        grid-template-columns: 1fr 1fr;
      }

      canvas {
        height: 54vh;
        min-height: 280px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>お絵描きソフト</h1>

    <div class="toolbar">
      <div class="tool-group">
        <label for="colorPicker">色</label>
        <input type="color" id="colorPicker" value="#000000" />
      </div>

      <div class="tool-group grow">
        <label for="brushSize">太さ</label>
        <input type="range" id="brushSize" min="1" max="50" value="5" />
        <span class="size-value" id="sizeValue">5</span>
      </div>

      <div class="tool-group buttons">
        <button id="penBtn" class="active">ペン</button>
        <button id="eraserBtn" class="sub">消しゴム</button>
        <button id="undoBtn" class="sub">Undo</button>
        <button id="saveBtn" class="sub">保存</button>
        <button id="clearBtn" class="sub">クリア</button>
      </div>
    </div>

    <div class="canvas-wrap">
      <canvas id="drawCanvas"></canvas>
      <div class="note">マウス・タッチ・ペン入力に対応</div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("drawCanvas");
    const ctx = canvas.getContext("2d");

    const colorPicker = document.getElementById("colorPicker");
    const brushSize = document.getElementById("brushSize");
    const sizeValue = document.getElementById("sizeValue");

    const penBtn = document.getElementById("penBtn");
    const eraserBtn = document.getElementById("eraserBtn");
    const undoBtn = document.getElementById("undoBtn");
    const saveBtn = document.getElementById("saveBtn");
    const clearBtn = document.getElementById("clearBtn");

    let isDrawing = false;
    let lastX = 0;
    let lastY = 0;
    let currentTool = "pen";

    const history = [];
    const MAX_HISTORY = 30;

    function setContextStyle() {
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.lineWidth = Number(brushSize.value);

      if (currentTool === "pen") {
        ctx.globalCompositeOperation = "source-over";
        ctx.strokeStyle = colorPicker.value;
      } else if (currentTool === "eraser") {
        ctx.globalCompositeOperation = "destination-out";
        ctx.strokeStyle = "rgba(0,0,0,1)";
      }
    }

    function fillCanvasWhite() {
      ctx.save();
      ctx.globalCompositeOperation = "source-over";
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.restore();
    }

    function saveHistory() {
      if (history.length >= MAX_HISTORY) {
        history.shift();
      }
      history.push(canvas.toDataURL("image/png"));
    }

    function restoreFromDataUrl(dataUrl) {
      const image = new Image();
      image.onload = () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        fillCanvasWhite();
        ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
        setContextStyle();
      };
      image.src = dataUrl;
    }

    function undo() {
      if (history.length <= 1) return;

      history.pop();
      const previousState = history[history.length - 1];
      restoreFromDataUrl(previousState);
    }

    function updateToolButtons() {
      if (currentTool === "pen") {
        penBtn.classList.add("active");
        eraserBtn.classList.remove("active");
      } else {
        eraserBtn.classList.add("active");
        penBtn.classList.remove("active");
      }
    }

    function setTool(tool) {
      currentTool = tool;
      setContextStyle();
      updateToolButtons();
    }

    function resizeCanvas() {
      const oldImage = canvas.toDataURL("image/png");
      const rect = canvas.getBoundingClientRect();

      canvas.width = rect.width;
      canvas.height = rect.height;

      fillCanvasWhite();
      setContextStyle();

      const image = new Image();
      image.onload = () => {
        ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
        setContextStyle();
      };
      image.src = oldImage;
    }

    function getCanvasPosition(e) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: e.clientX - rect.left,
        y: e.clientY - rect.top
      };
    }

    function startDrawing(e) {
      isDrawing = true;

      const pos = getCanvasPosition(e);
      lastX = pos.x;
      lastY = pos.y;

      saveHistory();
    }

    function draw(e) {
      if (!isDrawing) return;

      const pos = getCanvasPosition(e);
      setContextStyle();

      ctx.beginPath();
      ctx.moveTo(lastX, lastY);
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();

      lastX = pos.x;
      lastY = pos.y;
    }

    function stopDrawing() {
      if (!isDrawing) return;
      isDrawing = false;
    }

    function clearCanvas() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      fillCanvasWhite();
      setContextStyle();
      saveHistory();
    }

    function saveImage() {
      const link = document.createElement("a");
      link.href = canvas.toDataURL("image/png");
      link.download = "oekaki.png";
      link.click();
    }

    colorPicker.addEventListener("input", () => {
      setContextStyle();
    });

    brushSize.addEventListener("input", () => {
      sizeValue.textContent = brushSize.value;
      setContextStyle();
    });

    penBtn.addEventListener("click", () => {
      setTool("pen");
    });

    eraserBtn.addEventListener("click", () => {
      setTool("eraser");
    });

    undoBtn.addEventListener("click", () => {
      undo();
    });

    saveBtn.addEventListener("click", () => {
      saveImage();
    });

    clearBtn.addEventListener("click", () => {
      clearCanvas();
    });

    canvas.addEventListener("pointerdown", (e) => {
      e.preventDefault();
      canvas.setPointerCapture(e.pointerId);
      startDrawing(e);
    });

    canvas.addEventListener("pointermove", (e) => {
      e.preventDefault();
      draw(e);
    });

    canvas.addEventListener("pointerup", (e) => {
      e.preventDefault();
      stopDrawing();
    });

    canvas.addEventListener("pointerleave", stopDrawing);
    canvas.addEventListener("pointercancel", stopDrawing);

    window.addEventListener("resize", resizeCanvas);

    function init() {
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width;
      canvas.height = rect.height;

      fillCanvasWhite();
      setContextStyle();
      updateToolButtons();
      sizeValue.textContent = brushSize.value;
      saveHistory();
    }

    init();
  </script>
</body>
</html>
